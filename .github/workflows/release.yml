name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_BASE: quay.io/aknochow
  GHCR_BASE: ghcr.io/aknochow

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.1.0

      - name: Test
        run: make test

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ogo
            containerfile: Containerfile
            runner: ubuntu-latest
            arch: amd64
          - image: ogo
            containerfile: Containerfile
            runner: ubuntu-24.04-arm
            arch: arm64
          - image: ogo-auth-bridge
            containerfile: Containerfile.auth-bridge
            runner: ubuntu-latest
            arch: amd64
          - image: ogo-auth-bridge
            containerfile: Containerfile.auth-bridge
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Login to Quay.io
        run: podman login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Build image
        run: podman build -f ${{ matrix.containerfile }} -t "${IMAGE_BASE}/${{ matrix.image }}:${{ github.ref_name }}-${{ matrix.arch }}" .

      - name: Push image
        run: podman push "${IMAGE_BASE}/${{ matrix.image }}:${{ github.ref_name }}-${{ matrix.arch }}"

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        image: [ogo, ogo-auth-bridge]

    steps:
      - name: Login to Quay.io
        run: podman login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Create and push manifest
        run: |
          TAG="${{ github.ref_name }}"
          podman manifest create "${IMAGE_BASE}/${IMAGE}:${TAG}"
          podman manifest add "${IMAGE_BASE}/${IMAGE}:${TAG}" "docker://${IMAGE_BASE}/${IMAGE}:${TAG}-amd64"
          podman manifest add "${IMAGE_BASE}/${IMAGE}:${TAG}" "docker://${IMAGE_BASE}/${IMAGE}:${TAG}-arm64"
          podman manifest push "${IMAGE_BASE}/${IMAGE}:${TAG}" "docker://${IMAGE_BASE}/${IMAGE}:${TAG}"
        env:
          IMAGE: ${{ matrix.image }}

      - name: Tag as latest (stable releases only)
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          skopeo copy --all \
            "docker://${IMAGE_BASE}/${IMAGE}:${{ github.ref_name }}" \
            "docker://${IMAGE_BASE}/${IMAGE}:latest"
        env:
          IMAGE: ${{ matrix.image }}

      - name: Inspect manifest
        run: skopeo inspect --raw "docker://${IMAGE_BASE}/${IMAGE}:${{ github.ref_name }}" | python3 -m json.tool
        env:
          IMAGE: ${{ matrix.image }}

  mirror:
    needs: manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [ogo, ogo-auth-bridge]

    steps:
      - name: Login to Quay.io
        run: podman login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to GHCR
        run: podman login -u "${{ github.repository_owner }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io

      - name: Mirror to GHCR
        run: |
          TAG="${{ github.ref_name }}"
          skopeo copy --all \
            "docker://${IMAGE_BASE}/${IMAGE}:${TAG}" \
            "docker://${GHCR_BASE}/${IMAGE}:${TAG}"
        env:
          IMAGE: ${{ matrix.image }}

      - name: Mirror latest to GHCR (stable releases only)
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          skopeo copy --all \
            "docker://${IMAGE_BASE}/${IMAGE}:latest" \
            "docker://${GHCR_BASE}/${IMAGE}:latest"
        env:
          IMAGE: ${{ matrix.image }}

  bundle:
    needs: manifest
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Login to Quay.io
        run: podman login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate bundle
        run: make bundle IMG="${IMAGE_BASE}/ogo:${{ github.ref_name }}" VERSION="${{ steps.version.outputs.version }}"

      - name: Build and push bundle image
        run: |
          podman build -f bundle.Dockerfile -t "${IMAGE_BASE}/ogo-bundle:${{ github.ref_name }}" .
          podman push "${IMAGE_BASE}/ogo-bundle:${{ github.ref_name }}"
          podman tag "${IMAGE_BASE}/ogo-bundle:${{ github.ref_name }}" "${IMAGE_BASE}/ogo-bundle:latest"
          podman push "${IMAGE_BASE}/ogo-bundle:latest"

      - name: Build and push catalog image
        run: |
          podman build -f catalog.Dockerfile -t "${IMAGE_BASE}/ogo-catalog:${{ github.ref_name }}" .
          podman push "${IMAGE_BASE}/ogo-catalog:${{ github.ref_name }}"
          podman tag "${IMAGE_BASE}/ogo-catalog:${{ github.ref_name }}" "${IMAGE_BASE}/ogo-catalog:latest"
          podman push "${IMAGE_BASE}/ogo-catalog:latest"

  release:
    needs: [manifest, bundle]
    if: >-
      always() &&
      needs.manifest.result == 'success' &&
      (needs.bundle.result == 'success' || needs.bundle.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --verbose --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          body: ${{ steps.changelog.outputs.content }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull --rebase origin main
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for ${TAG}"
          git push origin main
        env:
          TAG: ${{ github.ref_name }}
