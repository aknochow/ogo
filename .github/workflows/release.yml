name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: quay.io
  IMAGE_BASE: quay.io/aknochow

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: v2.1.0

      - name: Test
        run: make test

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ogo
            containerfile: Containerfile
            runner: ubuntu-latest
            platform: linux/amd64
          - image: ogo
            containerfile: Containerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - image: ogo-auth-bridge
            containerfile: Containerfile.auth-bridge
            runner: ubuntu-latest
            platform: linux/amd64
          - image: ogo-auth-bridge
            containerfile: Containerfile.auth-bridge
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.containerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.IMAGE_BASE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        image: [ogo, ogo-auth-bridge]

    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digest-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="-t ${IMAGE_BASE}/${IMAGE}:${TAG}"

          # Add :latest only for non-prerelease tags (v0.1.0 yes, v0.2.0-rc1 no)
          if [[ "${TAG}" != *-* ]]; then
            TAGS="${TAGS} -t ${IMAGE_BASE}/${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          IMAGE: ${{ matrix.image }}
          TAG: ${{ github.ref_name }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            ${MANIFEST_TAGS} \
            $(printf "${IMAGE_BASE}/${IMAGE}@sha256:%s " *)
        env:
          MANIFEST_TAGS: ${{ steps.tags.outputs.tags }}
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          IMAGE: ${{ matrix.image }}

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${IMAGE_BASE}/${IMAGE}:${TAG}"
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          IMAGE: ${{ matrix.image }}
          TAG: ${{ github.ref_name }}

  bundle:
    needs: manifest
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate bundle
        run: make bundle IMG="${IMAGE_BASE}/ogo:${TAG}" VERSION="${VERSION}"
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}

      - name: Build and push bundle image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: bundle.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/ogo-bundle:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}/ogo-bundle:latest

      - name: Build and push catalog image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: catalog.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/ogo-catalog:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}/ogo-catalog:latest

  release:
    needs: [manifest, bundle]
    if: >-
      always() &&
      needs.manifest.result == 'success' &&
      (needs.bundle.result == 'success' || needs.bundle.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --verbose --latest --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull --rebase origin main
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for ${TAG}"
          git push origin main
        env:
          TAG: ${{ github.ref_name }}
