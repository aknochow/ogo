name: Upstream Sync

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check upstream OpenShell release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/NVIDIA/OpenShell/releases/latest | jq -r .tag_name)
          if [ -z "${LATEST}" ] || [ "${LATEST}" = "null" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Failed to fetch upstream OpenShell version"
            exit 0
          fi
          CURRENT=$(grep -oP 'OpenShell-v\K[\d.]+' docs.toml | head -1)
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "latest_version=${LATEST#v}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          if [ "${LATEST#v}" != "${CURRENT}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "OpenShell updated: v${CURRENT} → ${LATEST}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "OpenShell is current: v${CURRENT}"
          fi

      - name: Update version references
        if: steps.check.outputs.changed == 'true'
        env:
          OLD_VERSION: ${{ steps.check.outputs.current }}
          NEW_VERSION: ${{ steps.check.outputs.latest_version }}
        run: |
          sed -i "s/OpenShell-v${OLD_VERSION}/OpenShell-v${NEW_VERSION}/g" docs.toml README.md
          echo "Updated OpenShell badge: v${OLD_VERSION} → v${NEW_VERSION}"

      - name: Compute release tag
        if: steps.check.outputs.changed == 'true'
        id: tag
        run: |
          BASE=$(grep -oP 'VERSION \?= \K[\d.]+' Makefile)
          NEW_TAG="v${BASE}-$(date -u +%y%m%d%H%M)"

          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${NEW_TAG}"

      - name: Create PR for version bump
        if: steps.check.outputs.changed == 'true'
        env:
          NEW_TAG: ${{ steps.tag.outputs.tag }}
          OPENSHELL_VERSION: ${{ steps.check.outputs.latest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/sync-openshell-${OPENSHELL_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          git diff --cached --quiet && exit 0

          git commit -m "chore: sync OpenShell ${OPENSHELL_VERSION}"
          git push origin "${BRANCH}"
          gh pr create \
            --title "chore: sync OpenShell ${OPENSHELL_VERSION}" \
            --body "Automated upstream sync: OpenShell ${OPENSHELL_VERSION}. Release tag \`${NEW_TAG}\` will be created after merge." \
            --base main --head "${BRANCH}"
