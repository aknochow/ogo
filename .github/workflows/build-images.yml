name: Build Multi-Arch Images

on:
  workflow_call:
    inputs:
      tags:
        description: 'Space-separated list of image tags to apply (e.g., "main" or "v0.1.0 latest")'
        required: true
        type: string
    secrets:
      QUAY_USERNAME:
        required: true
      QUAY_PASSWORD:
        required: true

env:
  REGISTRY: quay.io
  IMAGE_BASE: quay.io/aknochow
  GHCR_BASE: ghcr.io/aknochow

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ogo
            containerfile: Containerfile
            runner: ubuntu-latest
            platform: linux/amd64
          - image: ogo
            containerfile: Containerfile
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - image: ogo-auth-bridge
            containerfile: Containerfile.auth-bridge
            runner: ubuntu-latest
            platform: linux/amd64
          - image: ogo-auth-bridge
            containerfile: Containerfile.auth-bridge
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.containerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.IMAGE_BASE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digest_${{ matrix.image }}_${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        image: [ogo, ogo-auth-bridge]

    steps:
      - name: Download digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: digest_${{ matrix.image }}_*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          TAG_ARGS=""
          for tag in ${TAGS}; do
            TAG_ARGS="${TAG_ARGS} -t ${IMAGE_BASE}/${IMAGE}:${tag}"
          done
          docker buildx imagetools create \
            ${TAG_ARGS} \
            $(printf "${IMAGE_BASE}/${IMAGE}@sha256:%s " *)
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          IMAGE: ${{ matrix.image }}
          TAGS: ${{ inputs.tags }}

      - name: Inspect manifest
        run: |
          FIRST_TAG=$(echo "${TAGS}" | awk '{print $1}')
          docker buildx imagetools inspect "${IMAGE_BASE}/${IMAGE}:${FIRST_TAG}"
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          IMAGE: ${{ matrix.image }}
          TAGS: ${{ inputs.tags }}

  mirror:
    needs: manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [ogo, ogo-auth-bridge]

    steps:
      - name: Login to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror to GHCR
        run: |
          for tag in ${TAGS}; do
            echo "Mirroring ${IMAGE}:${tag} → ghcr.io"
            skopeo copy --all \
              "docker://${QUAY_BASE}/${IMAGE}:${tag}" \
              "docker://${GHCR_BASE}/${IMAGE}:${tag}"
          done
        env:
          QUAY_BASE: ${{ env.IMAGE_BASE }}
          GHCR_BASE: ${{ env.GHCR_BASE }}
          IMAGE: ${{ matrix.image }}
          TAGS: ${{ inputs.tags }}
