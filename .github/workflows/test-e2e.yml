name: E2E Tests

# E2E tests require an OpenShift cluster (CRC or full cluster).
# This workflow is disabled until CI infrastructure is set up.
# Run manually: make test-e2e against a cluster with KUBECONFIG set.

on:
  workflow_dispatch:

jobs:
  test-e2e:
    name: Run on OpenShift
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Running Test e2e
        run: |
          echo "E2E tests require an OpenShift cluster."
          echo "Run manually: KUBECONFIG=~/.kube/config make test-e2e"
