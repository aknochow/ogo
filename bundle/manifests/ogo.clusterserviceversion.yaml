apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "gateway.ogo.aknochow.io/v1alpha1",
          "kind": "OpenShellGateway",
          "metadata": {
            "name": "openshell"
          },
          "spec": {
            "auth": {
              "openshift": {
                "adminGroup": "openshell-admins",
                "tokenTTL": "8h"
              }
            },
            "database": {
              "secretName": "ogo-pg"
            },
            "logLevel": "info",
            "namespace": "ogo",
            "networkPolicy": {
              "enabled": true
            },
            "replicas": 1,
            "route": {
              "hostname": "openshell.apps.example.com"
            },
            "sandbox": {
              "appArmorProfile": "Unconfined",
              "defaultImage": "ghcr.io/nvidia/openshell-community/sandboxes/base:latest",
              "workspaceStorageSize": "2Gi"
            },
            "tls": {
              "certManager": {
                "issuerKind": "ClusterIssuer",
                "issuerName": "letsencrypt"
              },
              "enabled": false
            }
          }
        },
        {
          "apiVersion": "gateway.ogo.aknochow.io/v1alpha1",
          "kind": "OpenShellPolicy",
          "metadata": {
            "name": "claude-code",
            "namespace": "ogo"
          },
          "spec": {
            "filesystem": {
              "includeWorkdir": true,
              "readOnly": [
                "/usr",
                "/lib",
                "/etc",
                "/app",
                "/proc/self",
                "/dev/urandom"
              ],
              "readWrite": [
                "/sandbox",
                "/tmp",
                "/dev/null"
              ]
            },
            "network": {
              "anthropic": {
                "binaries": [
                  {
                    "path": "/usr/bin/claude"
                  },
                  {
                    "path": "/usr/local/bin/claude"
                  }
                ],
                "endpoints": [
                  {
                    "access": "read-write",
                    "enforcement": "enforce",
                    "host": "api.anthropic.com",
                    "port": 443,
                    "protocol": "rest"
                  },
                  {
                    "access": "read-write",
                    "enforcement": "enforce",
                    "host": "statsig.anthropic.com",
                    "port": 443,
                    "protocol": "rest"
                  },
                  {
                    "access": "read-write",
                    "enforcement": "enforce",
                    "host": "sentry.io",
                    "port": 443,
                    "protocol": "rest"
                  }
                ],
                "name": "Anthropic API"
              }
            },
            "policyName": "claude-code",
            "process": {
              "runAsGroup": "sandbox",
              "runAsUser": "sandbox"
            }
          }
        },
        {
          "apiVersion": "gateway.ogo.aknochow.io/v1alpha1",
          "kind": "OpenShellProvider",
          "metadata": {
            "name": "claude-code",
            "namespace": "ogo"
          },
          "spec": {
            "credentials": {
              "ANTHROPIC_API_KEY": {
                "key": "api-key",
                "name": "anthropic-secret"
              }
            },
            "providerType": "claude-code"
          }
        }
      ]
