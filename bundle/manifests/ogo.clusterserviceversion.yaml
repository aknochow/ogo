apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "gateway.ogo.io/v1alpha1",
          "kind": "OpenShellGateway",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "ogo"
            },
            "name": "openshell"
          },
          "spec": {
            "database": {
              "secretName": "openshell-pg-uri"
            },
            "image": "ghcr.io/nvidia/openshell/gateway",
            "logLevel": "info",
            "namespace": "ogo",
            "networkPolicy": {
              "enabled": true
            },
            "replicas": 1,
            "sandbox": {
              "appArmorProfile": "Unconfined",
              "defaultImage": "quay.io/aap/carbonite:latest",
              "workspaceStorageSize": "2Gi"
            },
            "tls": {
              "enabled": true
            }
          }
        },
        {
          "apiVersion": "gateway.ogo.io/v1alpha1",
          "kind": "OpenShellPolicy",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "ogo"
            },
            "name": "default-policy",
            "namespace": "ogo"
          },
          "spec": {
            "filesystem": {
              "includeWorkdir": true,
              "readOnly": [
                "/usr",
                "/etc"
              ],
              "readWrite": [
                "/sandbox",
                "/tmp"
              ]
            },
            "network": {
              "anthropic-api": {
                "binaries": [
                  {
                    "path": "/usr/bin/curl"
                  }
                ],
                "endpoints": [
                  {
                    "access": "read-write",
                    "host": "api.anthropic.com",
                    "port": 443,
                    "protocol": "rest"
                  }
                ],
                "name": "anthropic"
              }
            },
            "policyName": "default",
            "process": {
              "runAsGroup": "sandbox",
              "runAsUser": "sandbox"
            }
          }
        },
        {
          "apiVersion": "gateway.ogo.io/v1alpha1",
          "kind": "OpenShellProvider",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "ogo"
            },
            "name": "claude-code",
            "namespace": "ogo"
          },
          "spec": {
            "credentials": {
              "ANTHROPIC_API_KEY": {
                "key": "api-key",
                "name": "anthropic-secret"
              }
            },
            "providerType": "claude-code"
          }
        }
      ]
    capabilities: Basic Install
    createdAt: "2026-06-25T14:59:42Z"
    operators.operatorframework.io/builder: operator-sdk-v1.42.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: ogo.v0.1.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: OpenShellGateway is a cluster-scoped singleton that manages an
        OpenShell Gateway instance.
      displayName: Open Shell Gateway
      kind: OpenShellGateway
      name: openshellgateways.gateway.ogo.io
      version: v1alpha1
    - description: OpenShellPolicy defines a sandbox policy template for the OpenShell
        Gateway.
      displayName: Open Shell Policy
      kind: OpenShellPolicy
      name: openshellpolicies.gateway.ogo.io
      version: v1alpha1
    - description: OpenShellProvider defines a credential bundle for the OpenShell
        Gateway.
      displayName: Open Shell Provider
      kind: OpenShellProvider
      name: openshellproviders.gateway.ogo.io
      version: v1alpha1
