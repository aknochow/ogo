# cliff.toml — git-cliff configuration for OGO
# Generates CHANGELOG.md in Keep a Changelog format from conventional commits.
# Tag format: Semantic Versioning (v0.1.0, v0.2.0-rc1)

[changelog]
header = """
# Changelog

All notable changes to the OGO project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).
This project uses [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

<!-- generated by git-cliff — do not edit manually -->

"""
body = """
{%- if version %}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }} \
([{{ commit.id | truncate(length=7, end="") }}](https://github.com/aknochow/ogo/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
commit_preprocessors = [
    # Strip trailing whitespace
    { pattern = '\s+$', replace = "" },
]
commit_parsers = [
    # Skip merge commits
    { message = "^Merge branch", skip = true },
    { message = "^Merge pull request", skip = true },
    # Skip release changelog commits
    { message = "^docs: update CHANGELOG", skip = true },
    # Map conventional commit types to Keep a Changelog sections
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^style", group = "Changed" },
    { message = "^test", group = "Changed" },
    { message = "^chore", group = "Changed" },
    { message = "^ci", group = "Changed" },
    { message = "^build", group = "Changed" },
    { message = "^revert", group = "Removed" },
    { message = "^Revert", group = "Removed" },
    # Catch-all for non-conventional commits (older history)
    { message = ".*", group = "Other" },
]
filter_commits = false
link_parsers = []
