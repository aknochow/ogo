[project]
site_name = "OGO"
site_url = "https://aknochow.github.io/ogo/"
docs_dir = "docs"
site_dir = "public"

[project.theme]
name = "patternfly-6-dark"

# Badges — rendered in the docs site header and available as README markdown
# via: python3 scripts/ogo-docs.py badges
[[project.badges]]
label = "Version"
url   = "https://github.com/aknochow/ogo/releases"
img   = "https://img.shields.io/badge/version-v0.1.0-orange"

[[project.badges]]
label = "Docs"
url   = "https://aknochow.github.io/ogo/"
img   = "https://img.shields.io/badge/docs-online-blue?logo=readthedocs&logoColor=white"

[[project.badges]]
label = "GitHub"
url   = "https://github.com/aknochow/ogo"
img   = "https://img.shields.io/github/actions/workflow/status/aknochow/ogo/test.yml?branch=main&label=aknochow%2Fogo&logo=github&logoColor=white&labelColor=181717"

[[project.badges]]
label = "License"
url   = "https://github.com/aknochow/ogo/blob/main/LICENSE"
img   = "https://img.shields.io/badge/license-Apache%202.0-green"

[[project.badges]]
label = "Go"
url   = "https://go.dev/doc/go1.26"
img   = "https://img.shields.io/badge/go-1.26-00ADD8?logo=go&logoColor=white"

[[project.badges]]
label = "OpenShell"
url   = "https://github.com/NVIDIA/OpenShell/releases"
img   = "https://img.shields.io/badge/OpenShell-v0.0.88null-76b900?logo=nvidia&logoColor=white"

