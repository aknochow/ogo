# OpenShellGateway — production config with OpenShift SSO auth and Envoy Gateway
#
# Prerequisites:
#   - cert-manager with a ClusterIssuer named "letsencrypt"
#   - PostgreSQL Secret with key "uri" (e.g. postgresql://user:pass@host:5432/db)
#   - Envoy Gateway installed (GatewayClass "eg")
#   - DNS wildcard *.apps.<cluster> pointing to the cluster
#
# The operator auto-detects OpenShift and Gateway API availability.
# On OpenShift: deploys auth-bridge sidecar for SSO login.
# With Gateway API: creates Gateway + GRPCRoute + Let's Encrypt cert.
apiVersion: gateway.ogo.aknochow.io/v1alpha1
kind: OpenShellGateway
metadata:
  name: openshell
spec:
  namespace: ogo
  replicas: 1
  database:
    secretName: ogo-pg
  sandbox:
    defaultImage: ghcr.io/nvidia/openshell-community/sandboxes/base:latest
    workspaceStorageSize: "2Gi"
    appArmorProfile: "Unconfined"
  # tls.enabled controls TLS on the gateway pod itself.
  # Set to false when using Envoy Gateway (Envoy terminates TLS instead).
  # The Gateway API reconciler creates its own cert-manager Certificate
  # for the Envoy listener regardless of this setting.
  tls:
    enabled: false
    certManager:
      issuerName: letsencrypt
      issuerKind: ClusterIssuer
  route:
    hostname: openshell.apps.example.com
  auth:
    openshift:
      adminGroup: openshell-admins
      tokenTTL: "8h"
  logLevel: info
  networkPolicy:
    enabled: true
