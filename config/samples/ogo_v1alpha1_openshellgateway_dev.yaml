# OpenShellGateway — dev/local config (cluster-internal only)
#
# For development and testing inside a Kubernetes cluster.
# No external Route is created — access via port-forward only:
#   oc port-forward svc/openshell -n ogo 8080:8080
#   openshell gateway add https://localhost:8080 --gateway-insecure --name dev
#
# Uses self-signed TLS and mTLS client certificates for authentication.
# Extract client certs from the openshell-client-tls Secret.
#
# Prerequisites:
#   - PostgreSQL Secret with key "uri"
apiVersion: gateway.ogo.aknochow.io/v1alpha1
kind: OpenShellGateway
metadata:
  name: openshell
spec:
  namespace: ogo
  replicas: 1
  database:
    secretName: ogo-pg
  sandbox:
    defaultImage: ghcr.io/nvidia/openshell-community/sandboxes/base:latest
    workspaceStorageSize: "2Gi"
  tls:
    enabled: true
  auth:
    openshift:
      enabled: false
  route:
    enabled: false
  logLevel: debug
  networkPolicy:
    enabled: false
