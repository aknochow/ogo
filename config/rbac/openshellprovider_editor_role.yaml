# This rule is not used by the project ogo itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ogo.ogo.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ogo
    app.kubernetes.io/managed-by: kustomize
  name: openshellprovider-editor-role
rules:
- apiGroups:
  - ogo.ogo.io
  resources:
  - openshellproviders
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ogo.ogo.io
  resources:
  - openshellproviders/status
  verbs:
  - get
