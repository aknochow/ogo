# This rule is not used by the project ogo itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over gateway.ogo.aknochow.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ogo
    app.kubernetes.io/managed-by: kustomize
  name: openshellprovider-admin-role
rules:
- apiGroups:
  - gateway.ogo.aknochow.io
  resources:
  - openshellproviders
  verbs:
  - '*'
- apiGroups:
  - gateway.ogo.aknochow.io
  resources:
  - openshellproviders/status
  verbs:
  - get
