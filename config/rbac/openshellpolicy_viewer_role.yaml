# This rule is not used by the project ogo itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to gateway.ogo.aknochow.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ogo
    app.kubernetes.io/managed-by: kustomize
  name: openshellpolicy-viewer-role
rules:
- apiGroups:
  - gateway.ogo.aknochow.io
  resources:
  - openshellpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.ogo.aknochow.io
  resources:
  - openshellpolicies/status
  verbs:
  - get
